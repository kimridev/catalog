name: Publish Catalog Images

on:
  push:
    branches: ["main"]
    paths:
      - "images/**/*.json"
      - ".github/workflows/docker-publish-dispatch.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover image targets from catalog
        id: discover
        run: |
          python3 <<'PY'
          import glob
          import json
          import os

          targets = {}
          for path in glob.glob('images/**/*.json', recursive=True):
              with open(path, encoding='utf-8') as f:
                  data = json.load(f)

              image = data.get('image')
              if not isinstance(image, dict):
                  continue

              repo = image.get('repository', '').strip()
              tag = image.get('tag', '').strip() or 'latest'
              if not repo.startswith('ghcr.io/'):
                  continue

              cat_id = data.get('category_id', '').strip()
              var_id = data.get('id', '').strip()
              if not cat_id or not var_id:
                  continue

              dockerfile = f"docker/images/{cat_id}/{var_id.split(cat_id + '-', 1)[-1]}/Dockerfile" if var_id.startswith(cat_id + '-') else ""
              if not dockerfile or not os.path.exists(dockerfile):
                  continue

              key = f"{repo}:{tag}"
              targets[key] = {
                  'image': repo,
                  'tag': tag,
                  'dockerfile': dockerfile,
                  'source_file': path,
              }

          matrix = {'include': [targets[k] for k in sorted(targets.keys())]}
          out = json.dumps(matrix)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={out}\n")
          print(out)
          PY

  publish:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:${{ matrix.tag }}
            ${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
