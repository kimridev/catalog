name: Dispatch Docker Publish

on:
  push:
    branches: ["main"]
    paths:
      - "images/**/*.json"
      - ".github/workflows/docker-publish-dispatch.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover image targets from catalog
        id: discover
        run: |
          python3 <<'PY'
          import glob
          import json
          import os

          targets = {}
          for path in glob.glob('images/**/*.json', recursive=True):
              with open(path, encoding='utf-8') as f:
                  data = json.load(f)
              image = data.get('image')
              if not isinstance(image, dict):
                  continue
              repo = image.get('repository', '').strip()
              tag = image.get('tag', '').strip() or 'latest'
              if not repo.startswith('ghcr.io/'):
                  continue
              targets[f"{repo}:{tag}"] = {
                  'image': repo,
                  'tag': tag,
                  'source_file': path,
              }

          matrix = {'include': [targets[k] for k in sorted(targets.keys())]}
          out = json.dumps(matrix)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={out}\n")
          PY

  dispatch:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Dispatch publish event in same repo
        env:
          IMAGE_REF: ${{ matrix.image }}:${{ matrix.tag }}
          SOURCE_FILE: ${{ matrix.source_file }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d "{\"event_type\":\"catalog-image-publish\",\"client_payload\":{\"image\":\"$IMAGE_REF\",\"source_file\":\"$SOURCE_FILE\",\"catalog_sha\":\"${{ github.sha }}\"}}"
